<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        form {
            border: 3px solid #f1f1f1;
            max-width: 400px;
            margin: 50px auto;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background-color: #04AA6D;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            opacity: 0.8;
        }

        .container {
            padding: 16px;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            text-align: center;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <form id="resetPasswordForm">
        <div class="container">
            <h2>Reset Password</h2>
            <input type="password" id="newPassword" placeholder="New password (min 8 characters)" required>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <button type="submit">Reset Password</button>
            <div id="message"></div>
            <p><a href="login.html">Back to Login</a></p>
        </div>
    </form>

    <script>
        function getToken() {
            return new URLSearchParams(window.location.search).get('token');
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const token = getToken();

            if (!token) {
                messageDiv.innerHTML = '<div class="message error">Invalid token</div>';
                return;
            }

            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message error">Passwords do not match</div>';
                return;
            }

            if (newPassword.length < 8) {
                messageDiv.innerHTML = '<div class="message error">Password must be at least 8 characters</div>';
                return;
            }

            const xhr = new XMLHttpRequest();
            xhr.addEventListener("readystatechange", function () {
                if (this.readyState === 4) {
                    const response = JSON.parse(this.responseText);
                    if (this.status === 200) {
                        messageDiv.innerHTML = `<div class="message success">${response.message} <a href="login.html">Login now</a></div>`;
                    } else {
                        messageDiv.innerHTML = `<div class="message error">${response.message}</div>`;
                    }
                }
            });

            xhr.open("POST", "reset-password");
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify({ token: token, newPassword: newPassword }));
        });
    </script>
</body>

</html>
